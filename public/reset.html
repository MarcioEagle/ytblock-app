<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>YTBlock — Criar nova senha</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{font-family:'Poppins',sans-serif;--g:#00ff88;--g2:#00cfff;--bg0:#000;--bg3:#161622;--tx1:#f0f0f8;--tx2:#8888a8;--tx3:#44445a;--bdr:#1a1a2e}
html,body{height:100%;background:var(--bg0);color:var(--tx1)}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(0,255,136,.025) 1px,transparent 1px),linear-gradient(90deg,rgba(0,255,136,.025) 1px,transparent 1px);background-size:60px 60px;animation:g 25s linear infinite;pointer-events:none}
@keyframes g{to{background-position:60px 60px}}
.wrap{height:100%;display:flex;align-items:center;justify-content:center;padding:20px;position:relative;z-index:1}
.card{background:rgba(14,14,24,.9);border:1px solid var(--bdr);border-radius:20px;padding:44px 40px;width:100%;max-width:400px;backdrop-filter:blur(20px)}
.logo{display:flex;align-items:center;gap:10px;justify-content:center;margin-bottom:32px}
.logo-ico{width:40px;height:40px;border-radius:10px;background:rgba(0,255,136,.1);border:1px solid rgba(0,255,136,.3);display:flex;align-items:center;justify-content:center}
.logo-name{font-size:18px;font-weight:800;color:var(--g);letter-spacing:.06em}
h1{font-size:20px;font-weight:700;text-align:center;margin-bottom:6px}
.sub{font-size:13px;color:var(--tx2);text-align:center;margin-bottom:28px;line-height:1.5}
label{display:block;font-size:11px;font-weight:600;color:var(--tx3);letter-spacing:.08em;text-transform:uppercase;margin-bottom:7px}
input{width:100%;background:var(--bg3);border:1px solid var(--bdr);border-radius:10px;padding:13px 16px;color:var(--tx1);font-family:'Poppins',sans-serif;font-size:14px;outline:none;transition:border-color .2s;margin-bottom:16px}
input:focus{border-color:rgba(0,207,255,.45)}
input::placeholder{color:var(--tx3)}
.btn{width:100%;background:var(--g);color:#000;border:none;border-radius:10px;padding:14px;font-family:'Poppins',sans-serif;font-size:14px;font-weight:700;cursor:pointer;transition:opacity .2s}
.btn:hover{opacity:.9}
.msg{border-radius:8px;padding:10px 14px;font-size:13px;margin-bottom:16px;display:none}
.msg.ok{background:rgba(0,255,136,.1);border:1px solid rgba(0,255,136,.3);color:var(--g)}
.msg.err{background:rgba(255,59,59,.1);border:1px solid rgba(255,59,59,.3);color:#ff6b6b}
.back{display:block;text-align:center;margin-top:20px;font-size:13px;color:var(--tx3);text-decoration:none;transition:color .15s}
.back:hover{color:var(--tx1)}
</style>
</head>
<body>
<div class="wrap">
  <div class="card">
    <div class="logo">
      <div class="logo-ico">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#00ff88" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10"/><line x1="4.93" y1="4.93" x2="19.07" y2="19.07"/>
        </svg>
      </div>
      <div class="logo-name">YTBlock</div>
    </div>
    <h1>Criar nova senha</h1>
    <p class="sub">Digite sua nova senha abaixo para acessar seu dashboard.</p>
    <div class="msg" id="msg"></div>
    <div id="form-area">
      <label>Nova senha</label>
      <input type="password" id="pwd" placeholder="Mínimo 8 caracteres">
      <label>Confirmar senha</label>
      <input type="password" id="pwd2" placeholder="Repita a senha">
      <button class="btn" onclick="doReset()">Salvar nova senha</button>
    </div>
    <a href="/" class="back">← Voltar para o login</a>
  </div>
</div>
<script>
async function doReset(){
  const p1 = document.getElementById('pwd').value;
  const p2 = document.getElementById('pwd2').value;
  const msg = document.getElementById('msg');
  if(p1.length < 8){ showMsg('A senha precisa ter ao menos 8 caracteres.','err'); return; }
  if(p1 !== p2){ showMsg('As senhas não coincidem.','err'); return; }
  // Supabase handles the token via URL hash (#access_token=...)
  const hash = window.location.hash;
  const params = new URLSearchParams(hash.replace('#',''));
  const access_token = params.get('access_token');
  if(!access_token){ showMsg('Link inválido ou expirado. Solicite um novo.','err'); return; }
  try{
    const { createClient } = await import('https://esm.sh/@supabase/supabase-js@2');
    const sb = createClient(window.__SB_URL__ || '', window.__SB_KEY__ || '');
    const { error } = await sb.auth.updateUser({ password: p1 });
    if(error) throw error;
    showMsg('Senha alterada! Redirecionando...','ok');
    setTimeout(()=>window.location.href='/',2000);
  }catch(e){
    showMsg('Erro ao salvar: ' + (e.message||'tente novamente'),'err');
  }
}
function showMsg(t,type){
  const el = document.getElementById('msg');
  el.textContent = t; el.className = 'msg ' + type; el.style.display='block';
}
</script>
</body>
</html>
